services:
  - type: web
    name: campusconnect-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URL
        sync: false          # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false          # set to your Vercel URL after frontend deploy
